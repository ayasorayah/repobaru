<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <header class="app-header">
    <h1>Mini Dashboard</h1>
    <nav>
      <button data-view="users" class="nav-btn active">Users</button>
      <button data-view="tasks" class="nav-btn">Tasks</button>
      <button data-view="products" class="nav-btn">Products</button>
    </nav>
  </header>

  <main id="app">
    <section id="users-view" class="view"></section>
    <section id="tasks-view" class="view hidden"></section>
    <section id="products-view" class="view hidden"></section>
  </main>

  <script type="module" src="src/app.js"></script>
</body>

</html>
